<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Finanças</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>💰 Minhas Finanças</h1>

    <!-- SALÁRIO -->
    <div class="box">
        <h2>Salário</h2>
        <input type="number" id="salario" placeholder="R$">
        <button onclick="salvarSalario()">Salvar</button>
    </div>

    <!-- GASTOS -->
    <div class="box">
        <h2>Adicionar Gasto</h2>

        <input type="text" id="descricao" placeholder="Ex: Mercado">
        <input type="number" id="valor" placeholder="Valor">

        <select id="categoria">
            <option value="Casa">🏠 Despesas de casa</option>
            <option value="Aluguel">🏢 Aluguel</option>
            <option value="Viagem">✈️ Viagem</option>
            <option value="Consórcio">📄 Consórcio</option>
            <option value="Carro">🚗 Carro</option>
            <option value="Outros">📦 Outros</option>
        </select>

        <button onclick="adicionarGasto()">Adicionar</button>

        <ul id="lista"></ul>
    </div>

    <!-- RESUMO -->
    <div class="box">
        <h2>Resumo</h2>
        <button onclick="mostrarResumo()">Atualizar</button>
        <p id="totalGastos"></p>
        <p id="saldo"></p>
    </div>

    <!-- ANÁLISE -->
    <div class="box">
        <h2>Análise dos seus gastos</h2>
        <button onclick="analisarGastos()">Analisar</button>
        <p id="analise"></p>
    </div>

    <!-- VIAGEM -->
    <div class="box">
        <h2>Planejar Viagem ✈️</h2>

        <input type="text" id="destino" placeholder="Destino">
        <input type="number" id="dias" placeholder="Quantos dias?">

        <button onclick="mostrarOpcoes()">Calcular</button>

        <div id="opcoes" style="display:none;">
    
            </select>


            <input type="number" id="mesesPlano" placeholder="Em quantos meses quer viajar?">

            <button onclick="calcularViagem()">Ver custo</button>

            <hr>

            <button onclick="buscarVoos()">✈️ Ver Passagens</button>
            <button onclick="buscarOnibus()">🚌 Ver Ônibus</button>
            <button onclick="buscarHotel()">🏨 Ver Hospedagem</button>

        </div>

        <p id="resultado"></p>
    </div>

    <script src="script.js"></script>

</body>
</html>
