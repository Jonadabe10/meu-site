<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Finanças</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>💰 Minhas Finanças</h1>

<!-- SALÁRIO -->
<div class="box">
    <h2>Salário</h2>
    <input type="number" id="salario" placeholder="R$">
    <button onclick="salvarSalario()">Salvar</button>
</div>

<!-- GASTOS -->
<div class="box">
    <h2>Adicionar Gasto</h2>

    <h3>Categoria</h3>
    <div class="categorias">

        <div class="card-cat" onclick="selecionarCategoria(event, 'Casa')">🏠<span>Casa</span></div>
        <div class="card-cat" onclick="selecionarCategoria(event, 'Aluguel')">🏢<span>Aluguel</span></div>
        <div class="card-cat" onclick="selecionarCategoria(event, 'Viagem')">✈️<span>Viagem</span></div>
        <div class="card-cat" onclick="selecionarCategoria(event, 'Consórcio')">📄<span>Consórcio</span></div>
        <div class="card-cat" onclick="selecionarCategoria(event, 'Carro')">🚗<span>Carro</span></div>
        <div class="card-cat" onclick="selecionarCategoria(event, 'Outros')">📦<span>Outros</span></div>

    </div>

    <input type="hidden" id="categoriaSelecionada">

    <input type="text" id="descricao" placeholder="Descrição do gasto">
    <input type="number" id="valor" placeholder="Valor">

    <button onclick="adicionarGasto()">Adicionar</button>

    <ul id="lista"></ul>
</div>

<!-- RESUMO -->
<div class="box">
    <h2>Resumo</h2>
    <button onclick="mostrarResumo()">Atualizar</button>
    <p id="totalGastos"></p>
    <p id="saldo"></p>
</div>

<!-- ANÁLISE -->
<div class="box">
    <h2>Análise dos gastos</h2>
    <button onclick="analisarGastos()">Analisar</button>
    <p id="analise"></p>
</div>

<!-- VIAGEM -->
<div class="box">
    <h2>Planejar Viagem ✈️</h2>

    <input type="text" id="destino" placeholder="Destino">
    <input type="number" id="dias" placeholder="Dias">

    <button onclick="mostrarOpcoes()">Calcular</button>

    <div id="opcoes" style="display:none;">

        <select id="transporte">
            <option value="300">Ônibus (R$ 300)</option>
            <option value="800">Avião (R$ 800)</option>
        </select>

        <select id="hospedagem">
            <option value="100">Econômico (R$ 100/noite)</option>
            <option value="250">Hotel (R$ 250/noite)</option>
            <option value="500">Luxo (R$ 500/noite)</option>
        </select>

        <input type="number" id="mesesPlano" placeholder="Meses para viajar">

        <button onclick="calcularViagem()">Ver custo</button>

        <button onclick="buscarVoos()">✈️ Ver Passagens</button>
        <button onclick="buscarOnibus()">🚌 Ver Ônibus</button>
        <button onclick="buscarHotel()">🏨 Ver Hotel</button>
    </div>

    <p id="resultado"></p>
</div>

<script src="script.js"></script>

</body>
</html>
